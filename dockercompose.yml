version: '3.9'

services:

  postgres-auth:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
      POSTGRES_DB: auth_db
    ports:
      - '5433:5432'
    volumes:
      - pg_auth:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U auth_user -d auth_db']
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-board:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: board_user
      POSTGRES_PASSWORD: board_pass
      POSTGRES_DB: board_db
    ports:
      - '5434:5432'
    volumes:
      - pg_board:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U board_user -d board_db']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pg_auth:
  pg_board:
  redis_data: